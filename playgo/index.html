<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PlayGo - Hub</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#C4956A"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="icons/icon-192x192.png"><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/base.css"><style>:root{--nav-bg:rgba(26, 22, 18, 0.85)}:root.light-theme{--nav-bg:rgba(249, 247, 241, 0.85)}body{height:100vh;overflow:hidden;display:flex;flex-direction:column}.navbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:64px;background:var(--nav-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;transition:background-color .3s ease,border-color .3s ease}.nav-links{display:flex;gap:8px}.nav-item{padding:8px 16px;color:var(--muted);text-decoration:none;border-radius:8px;font-weight:600;transition:all .2s ease;cursor:pointer}.nav-item:hover{color:var(--fg);background:rgba(196,149,106,.1)}.nav-item.active{color:var(--accent);background:rgba(196,149,106,.15)}.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;padding:0;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:8px;cursor:pointer;transition:all .2s ease}.btn-icon:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}.btn-icon:active{transform:translateY(0)}.btn-icon svg{width:20px;height:20px;fill:currentColor}.zen-active{border-color:var(--accent)!important;background:rgba(196,149,106,.15)!important;transform:scale(.95)!important;box-shadow:inset 0 2px 4px rgba(0,0,0,.2)!important}.iframe-container{flex:1;width:100%;position:relative;background:var(--bg);transition:background-color .3s ease}iframe{width:100%;height:100%;border:none;display:block}@media (max-width:640px){.navbar{padding:0 12px}.nav-item{padding:6px 10px;font-size:.9rem}}@media (max-width:639px) and (orientation:portrait){.nav-game-btn{display:none!important}}</style></head><body><nav class="navbar"><div class="flex items-center gap-2 md:gap-6"><h1 class="text-xl md:text-2xl font-bold hidden sm:block" style="font-family:'Space Grotesk',sans-serif">PlayGo</h1><div class="nav-links"><a class="nav-item active" onclick="loadPage('intro.html', this)">Intro</a> <a class="nav-item" onclick="loadPage('goban.html', this)">Goban</a> <a class="nav-item" onclick="loadPage('atarigo.html', this)">Atari Go</a> <a class="nav-item" onclick="loadPage('weiqi.html', this)">Weiqi</a></div></div><div class="flex items-center gap-2 md:gap-4"><button class="btn-icon nav-square-btn" onclick="toggleTheme()" title="Cambia tema"><span id="themeIcon">☀️</span></button> <button class="btn-icon nav-square-btn nav-game-btn" id="settingsBtn" style="display:none" onclick="openIframeSettings()" title="Impostazioni"><svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53a7.76 7.76 0 0 0 .07-1 7.76 7.76 0 0 0-.07-.97l2.11-1.63a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.15 7.15 0 0 0-1.67-.97l-.38-2.65A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.38 2.65a7.15 7.15 0 0 0-1.67.97l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.49.49 0 0 0 .12.64l2.11 1.63a7.9 7.9 0 0 0 0 1.94l-2.11 1.66a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .61.22l2.49-1a7.15 7.15 0 0 0 1.67.97l.38 2.65c.05.24.26.42.49.42h4c.24 0 .44-.18.49-.42l.38-2.65a7.15 7.15 0 0 0 1.67-.97l2.49 1a.5.5 0 0 0 .61-.22l2-3.46a.49.49 0 0 0-.12-.64l-2.11-1.66z"/></svg></button> <button class="btn-icon nav-square-btn nav-game-btn" id="infoBtn" style="display:none" onclick="openIframeGameInfo()" title="Informazioni"><svg viewBox="0 0 24 24" fill="none"><text x="12" y="19.5" text-anchor="middle" font-size="22" font-weight="700" font-family="'Noto Serif JP',serif" fill="currentColor">i</text></svg></button> <button class="btn-icon nav-square-btn nav-game-btn" id="zenBtn" style="display:none" onclick="toggleIframeZenMode()" title="Modalità Zen"><svg viewBox="0 0 24 24"><text x="12" y="19.5" text-anchor="middle" font-size="21" font-weight="700" font-family="Space Grotesk,sans-serif" fill="currentColor">Z</text></svg></button></div></nav><div class="iframe-container"><iframe id="main-frame" src="intro.html" title="PlayGo Content"></iframe></div><script src="js/theme.js"></script><script>if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    function loadPage(url, el) {
      document.getElementById('main-frame').src = url;
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      if (el) el.classList.add('active');
    }

    function openIframeSettings() {
      const iframe = document.getElementById('main-frame');
      iframe.contentWindow.postMessage({ type: 'openSettings' }, '*');
    }

    function openIframeGameInfo() {
      const iframe = document.getElementById('main-frame');
      iframe.contentWindow.postMessage({ type: 'openGameInfo' }, '*');
    }

    function toggleIframeZenMode() {
      const iframe = document.getElementById('main-frame');
      iframe.contentWindow.postMessage({ type: 'toggleZenMode' }, '*');
    }

    function syncZenBtn(active) {
      const btn = document.getElementById('zenBtn');
      if (btn) btn.classList.toggle('zen-active', active);
    }

    function syncIframeTheme() {
      const iframe = document.getElementById('main-frame');
      try {
        if (iframe.contentWindow && iframe.contentWindow.document) {
          const iframeHtml = iframe.contentWindow.document.documentElement;
          if (iframeHtml && typeof iframeHtml.classList !== 'undefined') {
            if (isLightTheme) {
              iframeHtml.classList.add('light-theme');
            } else {
              iframeHtml.classList.remove('light-theme');
            }
          }
        }
      } catch (e) {}
    }

    window.addEventListener('storage', (e) => {
      if (e.key === 'themePreference') {
        initTheme();
      }
    });

    document.getElementById('main-frame').addEventListener('load', function () {
      syncIframeTheme();
      try {
        var page = this.contentWindow.location.pathname.split('/').pop();
        var isGamePage = ['goban.html', 'atarigo.html', 'weiqi.html'].includes(page);
        document.getElementById('settingsBtn').style.display = isGamePage ? '' : 'none';
        document.getElementById('infoBtn').style.display = isGamePage ? '' : 'none';
        document.getElementById('zenBtn').style.display = isGamePage ? '' : 'none';
        syncZenBtn(localStorage.getItem('zenMode') === 'true');
        document.querySelectorAll('.nav-item').forEach(function (nav) {
          var match = nav.getAttribute('onclick').match(/loadPage\('([^']+)'/);
          nav.classList.toggle('active', match && match[1] === page);
        });
      } catch (e) {}
    });

    window.addEventListener('message', function (e) {
      if (e.data && e.data.type === 'zenStateChanged') {
        syncZenBtn(e.data.active);
      }
    });

    document.addEventListener('DOMContentLoaded', initTheme);</script></body></html>
